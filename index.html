<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>아침 묵상 일지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--border:#e8e2d9;--text:#2c2416;--muted:#8a7e6e;--accent:#5c4a2a;--al:#f0ebe2;--mb:#eef4fa;--mc:#1a4a6e;--eb:#f2eefa;--ec:#4a2a6e;--ok:#2d6a4f;--r:14px;--sh:0 2px 12px rgba(44,36,22,.08);--obs:#fff8ee;--obs-b:#e8c97a;--obs-t:#7a5a00;--med:#f0f8ff;--med-b:#7ab8e8;--med-t:#1a3a5c;--pry:#fff4f0;--pry-b:#e8a07a;--pry-t:#6e2a1a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;font-size:16px;-webkit-text-size-adjust:100%}
.hdr{background:var(--accent);color:#fff;padding:14px 14px 12px;text-align:center;position:sticky;top:0;z-index:100}
.hdr h1{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;letter-spacing:.03em}
.dnav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px}
.dnb{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dnb:active{background:rgba(255,255,255,.3);transform:scale(.92)}
.hdr .ds{font-size:12px;opacity:.9;min-width:150px}
.dtoday{margin-top:7px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer}
.dtoday:active{background:rgba(255,255,255,.32)}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:99}
.tab{flex:1;padding:12px 8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.pg{display:none;padding:14px}
.pg.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:12px;box-shadow:var(--sh)}
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tag{font-size:11px;font-weight:500;padding:3px 11px;border-radius:20px;letter-spacing:.04em;white-space:nowrap}
.tag.m{background:var(--mb);color:var(--mc)}
.tag.e{background:var(--eb);color:var(--ec)}
.rn{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600}
.blinks{display:flex;gap:8px;flex-wrap:wrap}
.bb{flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;text-decoration:none;cursor:pointer;border:1px solid;transition:opacity .15s,transform .1s}
.bb:active{transform:scale(.97);opacity:.85}
.bb.k{background:var(--mb);color:var(--mc);border-color:#b8d4ec}
.bb.v{background:#f0faf0;color:#2d6a2d;border-color:#b8d4b8}

/* OIA 섹션 */
.oia-wrap{display:flex;flex-direction:column;gap:12px}
.oia-sec{border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.oia-sec.obs{border-color:var(--obs-b)}
.oia-sec.med{border-color:var(--med-b)}
.oia-sec.apl{border-color:var(--app-b)}
.oia-sec.pry{border-color:var(--pry-b)}
.oia-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;font-weight:600;letter-spacing:.04em}
.oia-sec.obs .oia-hdr{background:var(--obs-b);color:var(--obs-t)}
.oia-sec.med .oia-hdr{background:var(--med-b);color:var(--med-t)}
.oia-sec.apl .oia-hdr{background:var(--app-b);color:var(--app-t)}
.oia-sec.pry .oia-hdr{background:var(--pry-b);color:var(--pry-t)}
.oia-icon{font-size:16px}
.oia-hint{font-size:11px;font-weight:400;opacity:.75;margin-left:auto}
.oia-body{padding:10px 12px;background:#fff}
textarea{width:100%;padding:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;line-height:1.8;color:var(--text);background:transparent;border:none;border-radius:0;resize:vertical;outline:none;min-height:90px}
textarea::placeholder{color:#c0b8ac;font-size:13px}

/* 어제 적용 체크 - 인라인 미니 */
.ycheck-inline{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f4ff;border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.ycheck-label{font-size:11px;font-weight:600;color:#7a5a9e;white-space:nowrap}
.ycheck-text{font-size:11px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.check-btns{display:flex;gap:5px}
.chk{padding:4px 9px;border-radius:20px;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.chk:active{transform:scale(.94)}
.chk.kept{background:#e8f8ee;color:#1a6a3a;border-color:#7acfa0}
.chk.partial{background:#fff8e0;color:#7a5a00;border-color:#e8c97a}
.chk.notk{background:#ffeef0;color:#7a1a2a;border-color:#e8a0a8}
.chk.sel-kept{background:#1a6a3a;color:#fff;border-color:#1a6a3a}
.chk.sel-partial{background:#b88a00;color:#fff;border-color:#b88a00}
.chk.noset{background:#f0f0f0;color:#666;border-color:#bbb}
.chk.sel-noset{background:#555;color:#fff;border-color:#555}

.nl{font-size:12px;color:var(--muted);margin-bottom:7px}
.arow{display:flex;gap:8px;margin-top:13px}
.ab{flex:1;padding:12px;border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s,transform .1s}
.ab:active{transform:scale(.97)}
.ab.sv{background:var(--al);color:var(--accent);border:1px solid #d4c8b4}
.ab.cp{background:#eef4fa;color:var(--mc);border:1px solid #b8d4ec}
.ab.ex{background:var(--accent);color:#fff}
.sm{text-align:center;font-size:12px;color:var(--ok);margin-top:9px;min-height:18px;transition:opacity .3s}
.hi{display:flex;flex-direction:column;gap:9px}
.hitem{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;box-shadow:var(--sh)}
.hitem:active{border-color:var(--accent)}
.hd{font-size:12px;color:var(--muted);margin-bottom:4px}
.hr{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;margin-bottom:4px}
.hp{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:1.8}
.bk{background:none;border:none;color:var(--accent);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;padding:0 0 11px;display:block}
.dtag{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dn{white-space:pre-wrap;font-size:15px;line-height:1.9;font-family:'Noto Serif KR',serif}
.dn-sec{margin-bottom:14px}
.dn-sec-title{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:5px;padding:3px 9px;border-radius:20px;display:inline-block}
.dn-sec-title.obs{background:var(--obs-b);color:var(--obs-t)}
.dn-sec-title.med{background:var(--med-b);color:var(--med-t)}
.dn-sec-title.apl{background:var(--app-b);color:var(--app-t)}
.dn-sec-title.pry{background:var(--pry-b);color:var(--pry-t)}
.dn-sec-body{white-space:pre-wrap;font-size:14px;line-height:1.9;font-family:'Noto Serif KR',serif;color:var(--text);padding:0 4px}
.dn-check{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:12px}
.dn-check.kept{background:#e8f8ee;color:#1a6a3a}
.dn-check.partial{background:#fff8e0;color:#7a5a00}
.dn-check.notk{background:#ffeef0;color:#7a1a2a}
.div{height:1px;background:var(--border);margin:12px 0}
</style>
</head>
<body>
<div class="hdr">
  <h1>✝ 아침 묵상 일지</h1>
  <div class="dnav">
    <button class="dnb" onclick="changeDay(-1)">◀</button>
    <div class="ds" id="ds"></div>
    <button class="dnb" onclick="changeDay(1)">▶</button>
  </div>
  <button class="dtoday" id="todayBtn" onclick="goToday()" style="display:none">오늘로</button>
</div>
<div class="tabs">
  <button class="tab on" onclick="showTab('qt')">📖 오늘 묵상</button>
  <button class="tab" onclick="showTab('hist')">📋 기록 목록</button>
</div>
<div id="pg-qt" class="pg on">
  <div class="card">
    <div class="rrow"><span class="tag m">아침</span><span class="rn" id="mr"></span></div>
    <div class="blinks" id="ml"></div>
  </div>
  <div class="card">
    <div class="rrow"><span class="tag e">저녁</span><span class="rn" id="er"></span></div>
    <div class="blinks" id="el"></div>
  </div>
  <!-- 묵상 기록 -->
  <div class="card">
    <div class="nl">✏️ 오늘의 묵상 기록</div>
    <!-- 어제 적용 체크 인라인 -->
    <div class="ycheck-inline">
      <span class="ycheck-label">🔁 어제 적용</span>
      <span class="ycheck-text" id="yApplyText">기록 없음</span>
      <div class="check-btns">
        <button class="chk kept" id="chk-kept" onclick="selectCheck('kept')">✅ 지킴</button>
        <button class="chk partial" id="chk-partial" onclick="selectCheck('partial')">🔶 부분</button>
        <button class="chk notk" id="chk-notk" onclick="selectCheck('notk')">❌ 못지킴</button>
        <button class="chk noset" id="chk-noset" onclick="selectCheck('noset')">📭 세우지못함</button>
      </div>
    </div>
    <textarea id="ni" style="min-height:260px;background:var(--bg);border:1px solid var(--border);border-radius:10px;"></textarea>
    <div class="arow">
      <button class="ab sv" onclick="saveLocal()">💾 임시 저장</button>
      <button class="ab cp" onclick="copyNote()">📋 복사</button>
      <button class="ab ex" onclick="exportFile()">⬇ 파일 저장</button>
    </div>
    <div class="sm" id="sm"></div>
  </div>
</div>
<div id="pg-hist" class="pg">
  <div id="hc"></div>
</div>

const KRV=88,ESV=59;
function yvUrl(r,v){
  const book=r.b.toUpperCase();
  return`https://www.bible.com/bible/${v}/${book}.${r.c}`;
}
function mkLinks(r,id){
  document.getElementById(id).innerHTML=
    `<a class="bb k" href="${yvUrl(r,KRV)}" target="_blank">📖 개역한글</a>`+
    `<a class="bb v" href="${yvUrl(r,ESV)}" target="_blank">📗 ESV</a>`;
}

const WD=['일','월','화','수','목','금','토'];
function pad2(n){return String(n).padStart(2,'0');}
function keyOf(d){return`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;}
function labelOf(d){return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]}요일)`;}

const TODAY=new Date();
let curDate=new Date(TODAY);
let dk='',dl='',mo=0,dy=0,mLabel='',eLabel='',yCheckVal='';

function silentSaveCurrent(){
  // 날짜를 넘어가기 전, 현재 화면의 메모를 자동으로 저장(알림 없이)
  if(!dk) return;
  const note=document.getElementById('ni').value;
  if(note!==undefined){
    localStorage.setItem('qt-note-'+dk,note);
    const keys=JSON.parse(localStorage.getItem('qt-keys')||'[]');
    if(!keys.includes(dk)){keys.unshift(dk);localStorage.setItem('qt-keys',JSON.stringify(keys));}
    localStorage.setItem('qt-meta-'+dk,JSON.stringify({date:dl,m:mLabel,e:eLabel}));
  }
}

function changeDay(delta){
  silentSaveCurrent();
  curDate.setDate(curDate.getDate()+delta);
  render();
}
function goToday(){
  silentSaveCurrent();
  curDate=new Date(TODAY);
  render();
}

function render(){
  mo=curDate.getMonth()+1; dy=curDate.getDate();
  dk=keyOf(curDate); dl=labelOf(curDate);
  document.getElementById('ds').textContent=dl;
  document.getElementById('todayBtn').style.display=(keyOf(curDate)===keyOf(TODAY))?'none':'inline-block';

  const td=S[mo]&&S[mo][dy];
  if(td){
    mLabel=td[0]; eLabel=td[1];
    document.getElementById('mr').textContent=mLabel;
    document.getElementById('er').textContent=eLabel;
    mkLinks(td[2],'ml'); mkLinks(td[3],'el');
  } else {
    mLabel=''; eLabel='';
    document.getElementById('mr').textContent='계획표 준비 중';
    document.getElementById('er').textContent='계획표 준비 중';
    ['ml','el'].forEach(id=>document.getElementById(id).innerHTML='<span style="font-size:13px;color:#999">해당 날짜의 계획표가 없습니다</span>');
  }

  // 전날(하루 전) 적용 표시
  const y=new Date(curDate); y.setDate(y.getDate()-1);
  const yk=keyOf(y);
  const yApl=localStorage.getItem('qt-apl-'+yk)||'';
  const yApplyEl=document.getElementById('yApplyText');
  yApplyEl.textContent=(yApl&&yApl.trim())?yApl:'어제 적용 기록 없음';

  // 체크 상태 복원
  yCheckVal=localStorage.getItem('qt-ycheck-'+dk)||'';
  applyCheckUI(yCheckVal);

  // 메모 로드
  const DEFAULT_NOTE=`관찰:\n\n묵상:\n\n적용:\n\n기도:`;
  const sNote=localStorage.getItem('qt-note-'+dk)
    || [localStorage.getItem('qt-obs-'+dk), localStorage.getItem('qt-med-'+dk),
        localStorage.getItem('qt-apl-'+dk), localStorage.getItem('qt-pry-'+dk)]
        .filter(Boolean).join('\n\n') || '';
  document.getElementById('ni').value=sNote||DEFAULT_NOTE;
}
render();

function selectCheck(val){
  yCheckVal=val;
  localStorage.setItem('qt-ycheck-'+dk,val);
  applyCheckUI(val);
}
function applyCheckUI(val){
  ['kept','partial','notk','noset'].forEach(v=>{
    const b=document.getElementById('chk-'+v);
    b.className='chk '+v+(v===val?' sel-'+v:'');
  });
}

function saveLocal(){
  const note=document.getElementById('ni').value;
  localStorage.setItem('qt-note-'+dk,note);
  const keys=JSON.parse(localStorage.getItem('qt-keys')||'[]');
  if(!keys.includes(dk)){keys.unshift(dk);localStorage.setItem('qt-keys',JSON.stringify(keys));}
  localStorage.setItem('qt-meta-'+dk,JSON.stringify({date:dl,m:mLabel,e:eLabel}));
  showSm('저장되었습니다 ✓');
}
function exportFile(){
  saveLocal();
  const note=document.getElementById('ni').value;
  const checkLabels={kept:'✅ 지킴',partial:'🔶 부분 지킴',notk:'❌ 못 지킴',noset:'📭 세우지 못함'};
  const checkLine=yCheckVal?`어제 적용 결과: ${checkLabels[yCheckVal]||''}`:'' ;
  const txt=['✝ 아침 묵상 일지','날짜: '+dl,'','아침 본문: '+mLabel,'저녁 본문: '+eLabel,
    ...(checkLine?['',checkLine]:[]),
    '','────────────────','묵상 기록','────────────────','',note||'(기록 없음)',
    '','저장: '+new Date().toLocaleString('ko-KR')].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download='묵상_'+dk+'.txt'; a.click();
  showSm('파일 저장 완료 ✓');
}
function copyNote(){
  const note=document.getElementById('ni').value;
  const checkLabels={kept:'✅ 지킴',partial:'🔶 부분 지킴',notk:'❌ 못 지킴',noset:'📭 세우지 못함'};
  const checkLine=yCheckVal?`어제 적용: ${checkLabels[yCheckVal]}\n`:'';
  const text=`${dl}\n아침: ${mLabel} / 저녁: ${eLabel}\n${checkLine}\n${note}`;
  navigator.clipboard.writeText(text).then(()=>showSm('복사되었습니다 ✓')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showSm('복사되었습니다 ✓');
  });
}
function showSm(msg){
  const el=document.getElementById('sm');
  el.textContent=msg; el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,3500);
}
function showTab(t){
  document.querySelectorAll('.pg').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.getElementById('pg-'+t).classList.add('on');
  event.currentTarget.classList.add('on');
  if(t==='hist') renderHist();
}
let dKey=null;
const chkBadge={kept:'✅',partial:'🔶',notk:'❌',noset:'📭'};
const chkLabels={kept:'✅ 어제 적용: 지킴',partial:'🔶 어제 적용: 부분 지킴',notk:'❌ 어제 적용: 못 지킴',noset:'📭 어제 적용: 세우지 못함'};

function renderHist(){
  const c=document.getElementById('hc');
  if(dKey){renderDetail(dKey);return;}
  const keys=JSON.parse(localStorage.getItem('qt-keys')||'[]');
  if(!keys.length){c.innerHTML='<div class="emp">📖<br><br>저장된 묵상이 없습니다.<br>오늘의 묵상을 기록해 보세요!</div>';return;}
  c.innerHTML='<div class="hi">'+keys.map(k=>{
    const m=JSON.parse(localStorage.getItem('qt-meta-'+k)||'{}');
    const n=localStorage.getItem('qt-note-'+k)||localStorage.getItem('qt-obs-'+k)||'';
    const chk=localStorage.getItem('qt-ycheck-'+k)||'';
    const badge=chk?`<span style="font-size:13px;margin-left:4px">${chkBadge[chk]||''}</span>`:'';
    return`<div class="hitem" onclick="openDetail('${k}')"><div class="hd">${m.date||k}${badge}</div><div class="hr">${m.m||''}</div><div class="hp">${n||'(기록 없음)'}</div></div>`;
  }).join('')+'</div>';
}
function openDetail(k){dKey=k;renderDetail(k);}
function renderDetail(k){
  const c=document.getElementById('hc');
  const m=JSON.parse(localStorage.getItem('qt-meta-'+k)||'{}');
  const note=localStorage.getItem('qt-note-'+k)
    || [localStorage.getItem('qt-obs-'+k), localStorage.getItem('qt-med-'+k),
        localStorage.getItem('qt-apl-'+k), localStorage.getItem('qt-pry-'+k)]
        .filter(Boolean).join('\n\n') || '';
  const chk=localStorage.getItem('qt-ycheck-'+k)||'';
  const chkHtml=chk?`<div class="dn-check ${chk}">${chkLabels[chk]||''}</div>`:'';
  c.innerHTML=`<button class="bk" onclick="goBack()">← 목록으로</button><div class="card">${chkHtml}<div class="hd">${m.date||k}</div><div class="dtag"><span class="tag m">아침 ${m.m||''}</span><span class="tag e">저녁 ${m.e||''}</span></div><div class="div"></div><div class="dn">${note||'(기록 없음)'}</div></div>`;
}
function goBack(){dKey=null;renderHist();}
</script>
